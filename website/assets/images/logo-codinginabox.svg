    CodingInA<tspan fill="url(#logoGrad)">Box</tspan>
  </text>
  <!-- Tagline -->
  <text x="42" y="38" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#94A3B8" letter-spacing="2">BUILD. CODE. COMPETE.</text>

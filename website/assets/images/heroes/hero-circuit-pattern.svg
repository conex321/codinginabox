<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="50%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <pattern id="circuit" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <!-- Circuit traces -->
      <line x1="0" y1="100" x2="60" y2="100" stroke="rgba(37,99,235,0.15)" stroke-width="2"/>
      <line x1="60" y1="100" x2="60" y2="40" stroke="rgba(37,99,235,0.15)" stroke-width="2"/>
      <line x1="60" y1="40" x2="140" y2="40" stroke="rgba(37,99,235,0.15)" stroke-width="2"/>
      <line x1="140" y1="40" x2="140" y2="160" stroke="rgba(37,99,235,0.15)" stroke-width="2"/>
      <line x1="140" y1="160" x2="200" y2="160" stroke="rgba(37,99,235,0.15)" stroke-width="2"/>
      <line x1="100" y1="0" x2="100" y2="80" stroke="rgba(37,99,235,0.1)" stroke-width="1.5"/>
      <line x1="100" y1="120" x2="100" y2="200" stroke="rgba(37,99,235,0.1)" stroke-width="1.5"/>
      <!-- Circuit nodes -->
      <circle cx="60" cy="100" r="4" fill="rgba(37,99,235,0.2)"/>
      <circle cx="60" cy="40" r="4" fill="rgba(37,99,235,0.2)"/>
      <circle cx="140" cy="40" r="4" fill="rgba(37,99,235,0.2)"/>
      <circle cx="140" cy="160" r="4" fill="rgba(37,99,235,0.2)"/>
      <circle cx="100" cy="100" r="6" fill="none" stroke="rgba(37,99,235,0.25)" stroke-width="2"/>
      <!-- Small chip shapes -->
      <rect x="88" y="88" width="24" height="24" rx="2" fill="none" stroke="rgba(37,99,235,0.12)" stroke-width="1.5"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#heroGrad)"/>
  <rect width="1920" height="1080" fill="url(#circuit)"/>
  <!-- Floating geometric shapes -->
  <polygon points="300,200 340,280 260,280" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
  <polygon points="1600,150 1650,250 1550,250" fill="rgba(37,99,235,0.08)" stroke="rgba(37,99,235,0.15)" stroke-width="1"/>
  <circle cx="1500" cy="800" r="60" fill="none" stroke="rgba(16,185,129,0.1)" stroke-width="2"/>
  <rect x="200" y="700" width="80" height="80" rx="8" fill="none" stroke="rgba(37,99,235,0.08)" stroke-width="2" transform="rotate(15,240,740)"/>
  <circle cx="960" cy="540" r="200" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="960" cy="540" r="300" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
</svg>
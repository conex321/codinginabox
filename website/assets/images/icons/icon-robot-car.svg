<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="iconGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#iconGrad2)"/>
  <!-- Car body -->
  <rect x="14" y="26" width="36" height="14" rx="3" fill="white"/>
  <!-- Windshield -->
  <polygon points="22,26 30,18 42,18 42,26" fill="white" opacity="0.8" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>
  <!-- Wheels -->
  <circle cx="22" cy="42" r="5" fill="white"/>
  <circle cx="22" cy="42" r="2.5" fill="url(#iconGrad2)"/>
  <circle cx="42" cy="42" r="5" fill="white"/>
  <circle cx="42" cy="42" r="2.5" fill="url(#iconGrad2)"/>
  <!-- Sensor (ultrasonic) -->
  <circle cx="48" cy="30" r="2" fill="rgba(0,0,0,0.2)"/>
  <circle cx="48" cy="36" r="2" fill="rgba(0,0,0,0.2)"/>
  <!-- Antenna -->
  <line x1="40" y1="18" x2="44" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="44" cy="11" r="1.5" fill="white"/>
</svg>